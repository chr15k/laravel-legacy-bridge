laravel: '@testbench'

providers:
  - Workbench\App\Providers\WorkbenchServiceProvider

bootstrap:
  - workbench/bootstrap/app.php

migrations:
  - workbench/database/migrations

seeders:
  - Workbench\Database\Seeders\DatabaseSeeder

env:
  SESSION_DRIVER: database
  DB_CONNECTION: mysql
  DB_DATABASE: workbench
  DB_USERNAME: root
  DB_PASSWORD: password
  LEGACY_BRIDGE_APP_KEY: AckfSECXIvnK5r28GVIWUAxmbBSjTsmF
  APP_KEY: AckfSECXIvnK5r28GVIWUAxmbBSjTsmF
  LEGACY_BRIDGE_DB_CONNECTION: mysql
  LEGACY_BRIDGE_SESSION_TABLE: legacy_sessions
  LEGACY_BRIDGE_COOKIE: legacy-test-session

workbench:
  start: '/'
  install: true
  health: false
  discovers:
    web: true
    api: true
    commands: true
    components: false
    factories: true
    views: false
  build:
    - asset-publish
    - create-sqlite-db
    - db-wipe
    - migrate-fresh
  assets:
    - laravel-assets
  sync:
    - from: storage
      to: workbench/storage
      reverse: true
